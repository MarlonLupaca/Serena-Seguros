# ===================================================================
# CONFIGURACION GENERAL DEL APLICATIVO
# ===================================================================
spring.application.name=serena

# ===================================================================
# CONFIGURACION DE CONEXION A BASE DE DATOS (MySQL)
# ===================================================================
# Si las variables DB_URL, DB_USERNAME o DB_PASSWORD existen, se usaran.
# De lo contrario, usara los valores locales por defecto despues de los dos puntos (:).
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3308/bd_seguros_pacifico?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# Driver oficial de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# CONFIGURACION DEL POOL DE CONEXIONES (HikariCP)
# ===================================================================
# Limite maximo de conexiones simultaneas permitidas a la BD
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:20}
# Conexiones minimas que siempre estaran abiertas esperando peticiones
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:5}

# ===================================================================
# CONFIGURACION DEL ORM (JPA / HIBERNATE)
# ===================================================================
# Dialecto exacto para optimizar las consultas en MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# -------------------------------------------------------------------
# REGLA CRITICA DE ARQUITECTURA: GESTION DE ESQUEMA
# -------------------------------------------------------------------
# 'validate': Hibernate SOLO verificara que las clases @Entity coincidan
# exactamente con las tablas de MySQL.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:validate}

# En produccion querras desactivar esto para no colapsar los logs, por defecto esta en true para local
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}

# ===================================================================
# FORMATO DE NOMBRES EN JSON
# ===================================================================
# Que el JSON salga y entre en snake_case para que coincida con la BD
spring.jackson.property-naming-strategy=SNAKE_CASE

# ===================================================================
# CONFIGURACION DE ARCHIVOS / DOCUMENTOS
# ===================================================================
# Carpeta donde se guardan los documentos subidos (en produccion podrias querer cambiar la ruta)
app.documentos.dir=${APP_DOCS_DIR:uploads}
# Tamano maximo por archivo
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================================================================
# CONFIGURACION JWT
# ===================================================================
# Llave secreta para firmar los tokens (Obligatorio cambiar en produccion)
app.jwt.secret=${JWT_SECRET:cambiar-esta-llave-secreta-en-produccion-12345}
# Duracion del access token: 15 minutos
app.jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION:900000}
# Duracion del refresh token: 7 dias
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION:604800000}

# ===================================================================
# CONFIGURACION JIRA
# ===================================================================
app.jira.url=${JIRA_URL}
app.jira.username=${JIRA_USERNAME}
app.jira.token=${TOKEN_JIRA}