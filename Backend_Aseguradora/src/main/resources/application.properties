# ===================================================================
# CONFIGURACIÓN GENERAL DEL APLICATIVO
# ===================================================================
spring.application.name=serena

# ===================================================================
# CONFIGURACIÓN DE CONEXIÓN A BASE DE DATOS (MySQL)
# ===================================================================
# URL de conexión a la base de datos
spring.datasource.url=jdbc:mysql://localhost:3308/bd_seguros_pacifico?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Credenciales de acceso
spring.datasource.username=root
spring.datasource.password=root

# Driver oficial de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# CONFIGURACIÓN DEL POOL DE CONEXIONES (HikariCP)
# ===================================================================
# Límite máximo de conexiones simultáneas permitidas a la BD
spring.datasource.hikari.maximum-pool-size=20
# Conexiones mínimas que siempre estarán abiertas esperando peticiones
spring.datasource.hikari.minimum-idle=5

# ===================================================================
# CONFIGURACIÓN DEL ORM (JPA / HIBERNATE)
# ===================================================================
# Dialecto exacto para optimizar las consultas en MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# -------------------------------------------------------------------
# REGLA CRÍTICA DE ARQUITECTURA: GESTIÓN DE ESQUEMA
# -------------------------------------------------------------------
# 'validate': Hibernate SOLO verificará que las clases @Entity coincidan
# exactamente con las tablas de MySQL. NO creará, alterará, ni eliminará 
# ninguna tabla, columna o llave foránea.
spring.jpa.hibernate.ddl-auto=validate

# Mostrar el SQL generado en la consola
spring.jpa.show-sql=true
# Formatear el SQL en la consola para mayor legibilidad
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# CONFIGURACIÓN JWT
# ===================================================================
# Llave secreta para firmar los tokens (mínimo 32 caracteres)
app.jwt.secret=${JWT_SECRET:cambiar-esta-llave-secreta-en-produccion-12345}
# Duración del access token: 15 minutos
app.jwt.access-expiration-ms=900000
# Duración del refresh token: 7 días
app.jwt.refresh-expiration-ms=604800000