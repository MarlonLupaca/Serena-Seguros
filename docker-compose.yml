version: '3.8'

services:
  # ----------------------------------------
  # 1. BD MAESTRO
  # ----------------------------------------
  serena-mysql-master:
    image: mysql:8.0
    container_name: mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bd_seguros_pacifico
    ports:
      - '3308:3306'
    networks:
      - serena_network
    # Activamos el Server ID 1 y el modo GTID
    command: --server-id=1 --log-bin=mysql-bin --enforce-gtid-consistency=ON --gtid-mode=ON
    volumes:
      - master_data:/var/lib/mysql
      # Scripts iniciales
      - ./Script_DB:/docker-entrypoint-initdb.d

  # ----------------------------------------
  # 2. BD RÉPLICA
  # ----------------------------------------
  serena-mysql-replica:
    image: mysql:8.0
    container_name: mysql-replica
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3309:3306'
    networks:
      - serena_network
    # Activamos el Server ID 2, GTID y la ponemos en Modo Lectura
    command: --server-id=2 --enforce-gtid-consistency=ON --gtid-mode=ON --read-only=1
    volumes:
      - replica_data:/var/lib/mysql

  # ----------------------------------------
  # 3. BACKUP AUTOMATIZADO (Sidecar)
  # ----------------------------------------
  serena-mysql-backup:
    image: mysql:8.0
    container_name: mysql-backup
    networks:
      - serena_network
    volumes:
      - ./backups:/backups
    command: >
      bash -c "
      echo 'Esperando a que la base de datos réplica inicie...';
      sleep 30;
      while true; do
        FECHA=\$$(date +'%Y-%m-%d_%H-%M-%S');
        ARCHIVO=/backups/backup_\$$FECHA.sql.gz;
        echo 'Iniciando backup en: '\$$ARCHIVO;
        mysqldump -h serena-mysql-replica -u root -proot bd_seguros_pacifico | gzip > \$$ARCHIVO;
        echo 'Backup completado exitosamente.';
        sleep 86400;
      done
      "

  # ----------------------------------------
  # 4. BACKEND
  # ----------------------------------------
  backend:
    build:
      context: ./Backend_Aseguradora
      dockerfile: Dockerfile
    container_name: serena-backend
    env_file:
      - ./Backend_Aseguradora/.env
    environment:
      - DB_URL=jdbc:mysql://serena-mysql-master:3306/bd_seguros_pacifico?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    ports:
      - '8080:8080'
    networks:
      - serena_network
    depends_on:
      - serena-mysql-master

  # ----------------------------------------
  # 5. FRONTEND
  # ----------------------------------------
  frontend:
    build:
      context: ./Frontend_Aseguradora
      dockerfile: Dockerfile
    container_name: serena-frontend
    ports:
      - '3000:3000'
    networks:
      - serena_network
    depends_on:
      - backend

  # ----------------------------------------
  # ----------------------------------------
  # 6. TELEGRAF (Monitor Compatible con Windows/WSL2)
  # ----------------------------------------
  telegraf:
    image: telegraf:latest
    container_name: telegraf
    user: root
    entrypoint: ["sh", "-c", "chmod 666 /var/run/docker.sock && telegraf"]
    volumes:
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - '9273:9273'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - serena_network

  # ----------------------------------------
  # 7. PROMETHEUS (Base de datos métricas)
  # ----------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - serena_network
    depends_on:
      - telegraf

  # ----------------------------------------
  # 8. GRAFANA (Panel visual)
  # ----------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/serena_monitoring.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - serena_network
    depends_on:
      - prometheus

networks:
  serena_network:
    driver: bridge

volumes:
  master_data:
  replica_data:
  prometheus_data:
  grafana_data:
